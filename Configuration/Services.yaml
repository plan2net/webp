services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Plan2net\Webp\EventListener\AfterFileProcessing:
    tags:
      - name: event.listener
        identifier: 'webp.after-file-processing'
        event: TYPO3\CMS\Core\Resource\Event\AfterFileProcessingEvent

  Plan2net\Webp\Service\SiblingFile: ~

  Plan2net\Webp\EventListener\BeforeFileMoved:
    tags:
      - name: event.listener
        identifier: 'webp.before-file-moved'
        event: TYPO3\CMS\Core\Resource\Event\BeforeFileMovedEvent

  Plan2net\Webp\EventListener\AfterFileMoved:
    tags:
      - name: event.listener
        identifier: 'webp.after-file-moved'
        event: TYPO3\CMS\Core\Resource\Event\AfterFileMovedEvent

  Plan2net\Webp\EventListener\AfterFileDeleted:
    tags:
      - name: event.listener
        identifier: 'webp.after-file-deleted'
        event: TYPO3\CMS\Core\Resource\Event\AfterFileDeletedEvent

  Plan2net\Webp\EventListener\AfterFileReplaced:
    tags:
      - name: event.listener
        identifier: 'webp.after-file-replaced'
        event: TYPO3\CMS\Core\Resource\Event\AfterFileReplacedEvent

  Plan2net\Webp\EventListener\BeforeFileRenamed:
    tags:
      - name: event.listener
        identifier: 'webp.before-file-renamed'
        event: TYPO3\CMS\Core\Resource\Event\BeforeFileRenamedEvent

  Plan2net\Webp\EventListener\AfterFileRenamed:
    tags:
      - name: event.listener
        identifier: 'webp.after-file-renamed'
        event: TYPO3\CMS\Core\Resource\Event\AfterFileRenamedEvent

  Plan2net\Webp\Service\SiblingGenerator:
    public: true

  Plan2net\Webp\Service\PathMatcher:
    public: true

  Plan2net\Webp\Service\ProcessedFileWriter: ~

  Plan2net\Webp\Service\FailedAttemptsRepository: ~

  Plan2net\Webp\Domain\Queue\ConversionQueueRepository: ~

  Plan2net\Webp\Service\FolderScanner: ~

  Plan2net\Webp\Command\ProcessConversionQueueCommand:
    tags:
      - name: 'console.command'

  Plan2net\Webp\Command\DiagnoseCommand:
    tags:
      - name: 'console.command'

  # public: true required so GeneralUtility::makeInstance(Configuration::class) resolves
  # the service from the container (called from FileNameFilter::filterSiblingFiles and from
  # ext_localconf.php — neither has a DI constructor injection point).
  Plan2net\Webp\Service\Configuration:
    public: true

  # public: true required so GeneralUtility::makeInstance() resolves it with its
  # constructor dependencies when called from the CompressionInfoElement FormEngine node.
  Plan2net\Webp\Backend\CompressionReportProvider:
    public: true
