# Caddy config for the plan2net/webp E2E runner. The negotiation block is
# injected at runtime from `webp:webserver-config` output by run.sh, so CI
# proves the generated config negotiates correctly on real servers.
# `__INSTANCE_PUBLIC__` and `__PORT__` are replaced by run.sh before caddy starts.
{
	admin off
	auto_https off
	log {
		output file /tmp/plan2net-webp-e2e/caddy-error.log
		level WARN
	}
}

http://127.0.0.1:__PORT__ {
	root * __INSTANCE_PUBLIC__

	__WEBP_MAIN__

	handle {
		file_server
	}
}
