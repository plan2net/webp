# Caddy config for the plan2net/webp E2E runner. Mirrors the recipe in
# README.md (Webserver configuration → Caddy) so the test catches drift between
# docs and real behaviour. `__INSTANCE_PUBLIC__` and `__PORT__` are replaced by
# run.sh before caddy starts.
{
	admin off
	auto_https off
	log {
		output file /tmp/plan2net-webp-e2e/caddy-error.log
		level WARN
	}
}

http://127.0.0.1:__PORT__ {
	root * __INSTANCE_PUBLIC__

	# Accept-header → sibling suffix, preference order AVIF → WebP → JXL. A
	# format the client didn't ask for maps to "" so {path}.{suffix} becomes
	# {path}. and never matches a real file, so try_files skips it.
	map {header.Accept} {avif_suffix} {
		~image/avif avif
		default ""
	}
	map {header.Accept} {webp_suffix} {
		~image/webp webp
		default ""
	}
	map {header.Accept} {jxl_suffix} {
		~image/jxl jxl
		default ""
	}

	@images path_regexp \.(png|gif|jpe?g)$
	handle @images {
		header Vary Accept
		# route keeps execution in written order: try_files rewrites the URI to
		# the chosen sibling first, then the path matchers below see the rewritten
		# extension and pin the Content-Type before file_server runs (ServeContent
		# only fills in a Content-Type when one isn't already set). Declaring the
		# image types here mirrors nginx.conf — the test must not depend on distro
		# /etc/mime.types, where Go's file_server otherwise returns
		# application/octet-stream for .jxl.
		route {
			try_files {path}.{avif_suffix} {path}.{webp_suffix} {path}.{jxl_suffix} {path}
			@served_avif path *.avif
			@served_webp path *.webp
			@served_jxl path *.jxl
			header @served_avif Content-Type image/avif
			header @served_webp Content-Type image/webp
			header @served_jxl Content-Type image/jxl
			file_server
		}
	}

	handle {
		file_server
	}
}
