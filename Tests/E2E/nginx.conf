# nginx config for the plan2net/webp E2E runner. Mirrors the recipe in README.md
# (Webserver configuration → nginx) so the test catches drift between docs and
# real behaviour. `__INSTANCE_PUBLIC__` is replaced by run.sh before nginx starts.

daemon off;
error_log /tmp/plan2net-webp-e2e/nginx-error.log warn;
pid /tmp/plan2net-webp-e2e/nginx.pid;

events {
    worker_connections 64;
}

http {
    default_type application/octet-stream;
    sendfile on;
    access_log /tmp/plan2net-webp-e2e/nginx-access.log;

    # Minimal MIME table for the file types this test serves. Keeping it local
    # avoids distro drift in /etc/nginx/mime.types for AVIF/JXL.
    types {
        image/jpeg jpg jpeg;
        image/png  png;
        image/gif  gif;
        image/webp webp;
        image/avif avif;
        image/jxl  jxl;
    }

    # Preference order: AVIF first, WebP next, JXL last. First match wins.
    map $http_accept $sibling_suffix {
        default        "";
        "~*image/avif" ".avif";
        "~*image/webp" ".webp";
        "~*image/jxl"  ".jxl";
    }

    server {
        listen 127.0.0.1:__PORT__;
        server_name localhost;
        root __INSTANCE_PUBLIC__;

        location ~* ^.+\.(png|gif|jpe?g)$ {
            add_header Vary "Accept";
            add_header Cache-Control "public, no-transform";
            try_files $uri$sibling_suffix $uri =404;
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
