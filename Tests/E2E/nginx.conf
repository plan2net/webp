# nginx config for the plan2net/webp E2E runner. The negotiation blocks are
# injected at runtime from `webp:webserver-config` output by run.sh, so CI
# proves the generated config negotiates correctly on real servers.
# `__INSTANCE_PUBLIC__` and `__PORT__` are replaced by run.sh before nginx starts.

daemon off;
error_log /tmp/plan2net-webp-e2e/nginx-error.log warn;
pid /tmp/plan2net-webp-e2e/nginx.pid;

events {
    worker_connections 64;
}

http {
    default_type application/octet-stream;
    sendfile on;
    access_log /tmp/plan2net-webp-e2e/nginx-access.log;

    # Minimal MIME table for the file types this test serves. Keeping it local
    # avoids distro drift in /etc/nginx/mime.types for AVIF/JXL.
    types {
        image/jpeg jpg jpeg;
        image/png  png;
        image/gif  gif;
        image/webp webp;
        image/avif avif;
        image/jxl  jxl;
    }

    __WEBP_HTTP__

    server {
        listen 127.0.0.1:__PORT__;
        server_name localhost;
        root __INSTANCE_PUBLIC__;

        __WEBP_SERVER__

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
