# Apache config for the plan2net/webp E2E runner. The negotiation block is
# injected at runtime from `webp:webserver-config` output by run.sh, so CI
# proves the generated config negotiates correctly on real servers.
# `__INSTANCE_PUBLIC__` and `__APACHE_*__` are replaced by run.sh before apache2 starts.

ServerRoot /etc/apache2
PidFile /tmp/plan2net-webp-e2e/apache.pid
ErrorLog /tmp/plan2net-webp-e2e/apache-error.log
CustomLog /tmp/plan2net-webp-e2e/apache-access.log combined

# log_config and unixd are built into Ubuntu's apache2 binary, so no
# LoadModule lines for them.
LoadModule mpm_event_module __APACHE_MODULES__/mod_mpm_event.so
LoadModule authz_core_module __APACHE_MODULES__/mod_authz_core.so
LoadModule mime_module __APACHE_MODULES__/mod_mime.so
LoadModule rewrite_module __APACHE_MODULES__/mod_rewrite.so
LoadModule headers_module __APACHE_MODULES__/mod_headers.so
LoadModule dir_module __APACHE_MODULES__/mod_dir.so

User __APACHE_USER__
Group __APACHE_GROUP__

Listen 127.0.0.1:__PORT__
ServerName localhost
DocumentRoot "__INSTANCE_PUBLIC__"

TypesConfig /etc/mime.types
DirectoryIndex index.html

<Directory />
    Require all denied
</Directory>

<Directory "__INSTANCE_PUBLIC__">
    Require all granted
    AllowOverride None
    Options FollowSymLinks

    __WEBP_MAIN__
</Directory>
