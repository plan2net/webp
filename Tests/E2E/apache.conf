# Apache config for the plan2net/webp E2E runner. Mirrors the recipe in
# README.md (Webserver configuration → Apache) so the test catches drift
# between docs and real behaviour. `__INSTANCE_PUBLIC__` and `__APACHE_*__`
# are replaced by run.sh before apache2 starts.

ServerRoot /etc/apache2
PidFile /tmp/plan2net-webp-e2e/apache.pid
ErrorLog /tmp/plan2net-webp-e2e/apache-error.log
CustomLog /tmp/plan2net-webp-e2e/apache-access.log combined

# log_config and unixd are built into Ubuntu's apache2 binary, so no
# LoadModule lines for them.
LoadModule mpm_event_module __APACHE_MODULES__/mod_mpm_event.so
LoadModule authz_core_module __APACHE_MODULES__/mod_authz_core.so
LoadModule mime_module __APACHE_MODULES__/mod_mime.so
LoadModule rewrite_module __APACHE_MODULES__/mod_rewrite.so
LoadModule headers_module __APACHE_MODULES__/mod_headers.so
LoadModule dir_module __APACHE_MODULES__/mod_dir.so

User __APACHE_USER__
Group __APACHE_GROUP__

Listen 127.0.0.1:__PORT__
ServerName localhost
DocumentRoot "__INSTANCE_PUBLIC__"

TypesConfig /etc/mime.types
DirectoryIndex index.html

<Directory />
    Require all denied
</Directory>

<Directory "__INSTANCE_PUBLIC__">
    Require all granted
    AllowOverride None
    Options FollowSymLinks

    AddType image/webp .webp
    AddType image/avif .avif
    AddType image/jxl  .jxl

    RewriteEngine On

    # AVIF preferred over WebP — first matching rule wins.
    RewriteCond %{HTTP_ACCEPT} image/avif
    RewriteCond %{REQUEST_FILENAME} (.*)\.(?i:png|gif|jpe?g)$
    RewriteCond %{REQUEST_FILENAME}\.avif -f
    RewriteRule ^ %{REQUEST_FILENAME}\.avif [L,T=image/avif]

    RewriteCond %{HTTP_ACCEPT} image/webp
    RewriteCond %{REQUEST_FILENAME} (.*)\.(?i:png|gif|jpe?g)$
    RewriteCond %{REQUEST_FILENAME}\.webp -f
    RewriteRule ^ %{REQUEST_FILENAME}\.webp [L,T=image/webp]

    RewriteCond %{HTTP_ACCEPT} image/jxl
    RewriteCond %{REQUEST_FILENAME} (.*)\.(?i:png|gif|jpe?g)$
    RewriteCond %{REQUEST_FILENAME}\.jxl -f
    RewriteRule ^ %{REQUEST_FILENAME}\.jxl [L,T=image/jxl]

    Header append Vary Accept "expr=%{REQUEST_URI} =~ /\.(jpe?g|png|gif)$/"
</Directory>
